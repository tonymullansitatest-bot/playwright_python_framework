name: Run Playwright Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Requires a GitHub Actions secret named PRIVATE_FEED_URL containing the
      # full authenticated Azure Artifacts index URL, e.g.:
      # https://<PAT>@sita-pse.pkgs.visualstudio.com/<feed-id>/_packaging/python_automation/pypi/simple/
      - name: Install private dependencies
        run: pip install framework/sita_playwright_python_utils-1.0.9.tar.gz

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pip show playwright | grep Version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests
        run: |
          behave src/features/parabank_examples src/features/practice \
            --no-capture \
            --format pretty \
            -D environment=prod \
            -D browser=chromium \
            -D browser_platform=desktop \
            -D headless=true

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: allure generate allure-results -o allure-report --clean

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
